image: node:20-slim

stages:
  - prepare
  - build
  - deploy

variables:
  NODE_ENV: production

scrape-news:
  stage: prepare
  image: python:3.11-slim
  before_script:
    - pip install --quiet feedparser requests python-dateutil
    - mkdir -p site/public/data
  script:
    - python scraper.py
  artifacts:
    paths:
      - site/public/data/news.json
    expire_in: 25 hours
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"

build-site:
  stage: build
  before_script:
    - npm ci --prefix site
  script:
    - npm run build --prefix site
    # Next.js static export goes to site/out/ → rename to public/ for GitLab Pages
    - mv site/out public
  artifacts:
    paths:
      - public
    expire_in: 1 hour
  needs:
    - scrape-news
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"

pages:
  stage: deploy
  script:
    - echo "Deploying to GitLab Pages"
  artifacts:
    paths:
      - public
  needs:
    - build-site
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"
